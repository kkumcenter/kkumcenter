<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1740 560" role="img" aria-labelledby="title desc">
  <title id="title">군북면 꿈키움센터 위치 안내 약도</title>
  <desc id="desc">충청남도 금산군 군북면 원두두길 44-9에 위치한 군북면 꿈키움센터를 중심으로 표시한 네이버지도풍 약도입니다.</desc>
  <defs>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0H0V80" fill="none" stroke="#dfe5df" stroke-width="1" opacity="0.35"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#26342d" flood-opacity="0.18"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#26342d" flood-opacity="0.12"/>
    </filter>
    <style>
      path[stroke]{fill:none}
      .label{font-family:"Pretendard","Noto Sans KR","Malgun Gothic",sans-serif;fill:#3f4b45;font-weight:800}
      .small{font-size:16px}
      .mid{font-size:20px}
      .roadlabel{font-size:17px;fill:#76694a;font-weight:900}
      .ui{font-size:15px;fill:#5e6964;font-weight:800}
    </style>
  </defs>

